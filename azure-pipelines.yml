# Docker
# Build and Push Spring Boot Docker Image

trigger:
  - main

resources:
  - repo: self

variables:
  imageName: deposit-dashboard

stages:
  - stage: Build
    displayName: Build and Push Image

    jobs:
      - job: Build
        displayName: Build and Push
        pool:
          vmImage: ubuntu-latest

        steps:
          - checkout: self

          # Ensure Gradle wrapper is executable
          - script: chmod +x gradlew
            displayName: Make Gradle Wrapper Executable

          # Read project version from Gradle
          - bash: |
              VERSION=$(./gradlew properties -q | awk -F': ' '/^version:/ {print $2}')
              echo "Project Version: $VERSION"
              echo "##vso[task.setvariable variable=IMAGE_TAG]$VERSION"
            displayName: Get Project Version

          # Build the Spring Boot WAR
          - task: Gradle@3
            displayName: Build WAR
            inputs:
              gradleWrapperFile: gradlew
              tasks: bootWar
              publishJUnitResults: false
              javaHomeOption: JDKVersion
              jdkVersionOption: "17"

          # Login to Azure Container Registry
          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: "<YOUR-ACR-SERVICE-CONNECTION>"

          # Build and Push Docker Image
          - task: Docker@2
            displayName: Build and Push Docker Image
            inputs:
              command: buildAndPush
              containerRegistry: "<YOUR-ACR-SERVICE-CONNECTION>"
              repository: $(imageName)
              Dockerfile: "**/Dockerfile"
              tags: |
                $(IMAGE_TAG)
                latest

          # Display the image tag in the pipeline log
          - script: |
              echo "Docker image tag: $(IMAGE_TAG)"
            displayName: Show Image Tag
