# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  # Azure Container Registry service connection name in Azure DevOps
  dockerRegistryServiceConnection: 'REPLACE_WITH_ACR_SERVICE_CONNECTION'
  # Repository name inside ACR (e.g. deposit-dashboard)
  imageRepository: 'deposit-dashboard'

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: DownloadSecureFile@1
      name: securityFile
      inputs:
        secureFile: certs.tar.gz
    - script: |
        cp "$(securityFile.secureFilePath)" $(Build.SourcesDirectory)/certs.tar.gz
      displayName: 'Prepare security files'
    - task: Docker@2
      displayName: Build and push image to ACR
      inputs:
        command: buildAndPush
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(tag)
